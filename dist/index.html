
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>스터디파이 브릿지 랜딩</title>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link href="https://fonts.googleapis.com/css2?family=WindSong&display=swap" rel="stylesheet" />
      <script type="module" crossorigin src="/assets/index-v2.js"></script>
      <link rel="stylesheet" crossorigin href="/assets/index-C6Kunt3Y.css">
      <style>
        /* 외부 전체너비 div 배경 제거 */
        div[data-name="상단 띠배너"] {
          background: transparent !important;
        }
        /* 내부 375px 컨테이너: 그라디언트 배경 */
        div[data-name="상단 띠배너"] > div {
          background: linear-gradient(91deg, #FF76D5 0.08%, #435AF7 99.92%) !important;
        }
        /* 텍스트 그룹: 피그마 기준 left:84.49px, 수직중앙 */
        div[data-name="상단 띠배너"] > div > div:first-child {
          top: 50% !important;
          left: 84.49px !important;
          right: auto !important;
          bottom: auto !important;
          transform: translateY(-50%) !important;
          width: 206.025px !important;
        }
        /* 메인 콘텐츠와 띠배너 사이 간격 제거 */
        div[data-name="1"] {
          top: 0 !important;
        }
      </style>
    </head>

    <body>
      <div id="root"></div>
      <script>
        window.onerror = function(msg, url, line, col, err) {
          document.getElementById('root').innerHTML =
            '<div style="padding:40px;color:red;font-size:16px">' +
            '<h2>JS Error</h2><pre>' + msg + '\n' + (err && err.stack || '') + '</pre></div>';
        };
        window.addEventListener('unhandledrejection', function(e) {
          document.getElementById('root').innerHTML =
            '<div style="padding:40px;color:red;font-size:16px">' +
            '<h2>Promise Error</h2><pre>' + (e.reason && e.reason.stack || e.reason) + '</pre></div>';
        });
      </script>
    </body>
  </html>
